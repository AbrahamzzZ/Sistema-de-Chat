<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat en Tiempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #F4F7F9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #334155;
        }

        .chat-container {
            width: 95%;
            max-width: 1300px;
            height: 90vh;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
            display: flex;
            overflow: hidden;
        }

        .users-panel {
            width: 280px;
            background: #EEF2F5;
            border-right: 1px solid #D8E1E8;
            padding: 20px;
        }

        .users-panel h3 {
            color: #475569;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        #users-list {
            list-style: none;
        }

        #users-list li {
            padding: 12px 14px;
            margin-bottom: 8px;
            background: white;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            color: #475569;
            transition: all .2s ease;
        }

        #users-list li:hover {
            background: #F8FAFC;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #FAFBFC;
        }

        #messages {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #messages li {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            animation: fadeIn .2s ease;
        }

        .my-message {
            align-self: flex-end;
            background: #DCEAF4;
            color: #334155;
            border-bottom-right-radius: 4px;
        }

        .other-message {
            align-self: flex-start;
            background: white;
            color: #334155;
            border: 1px solid #E2E8F0;
            border-bottom-left-radius: 4px;
        }

        .system {
            align-self: center;
            background: transparent !important;
            color: #64748B;
            font-style: italic;
            font-size: .85rem;
            max-width: 100% !important;
            text-align: center;
        }

        .message-user {
            display: block;
            font-weight: 600;
            font-size: .85rem;
            margin-bottom: 4px;
            color: #5B7C99;
        }

        .message-time {
            text-align: right;
            font-size: .75rem;
            color: #94A3B8;
            margin-top: 6px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #E2E8F0;
            background: white;
        }

        #form {
            display: flex;
            gap: 12px;
        }

        #input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #CBD5E1;
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            transition: all .2s ease;
        }

        #input:focus {
            border-color: #5B7C99;
            box-shadow: 0 0 0 4px rgba(91, 124, 153, 0.15);
        }

        button {
            padding: 14px 24px;
            background: #5B7C99;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all .2s ease;
        }

        button:hover {
            background: #4E6D87;
        }

        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 380px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(15, 23, 42, 0.15);
        }

        .login-box h2 {
            color: #334155;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #CBD5E1;
            border-radius: 12px;
            outline: none;
        }

        .login-box input:focus {
            border-color: #5B7C99;
            box-shadow: 0 0 0 4px rgba(91, 124, 153, 0.15);
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 20px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .users-panel {
                display: none;
            }

            #messages li {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Bienvenido al Chat</h2>
            <input type="text" id="usernameInput" placeholder="Ingresa tu nombre" maxlength="20">
            <br>
            <button onclick="connectToChat()">Conectar</button>
        </div>
    </div>

    <div class="chat-container" style="display: none;" id="chatContainer">
        <div class="users-panel">
            <h3>👥 Usuarios Conectados</h3>
            <ul id="users-list"></ul>
        </div>
        <div class="chat-area">
            <div class="messages-area">
                <ul id="messages"></ul>
            </div>
            <div class="input-area">
                <form id="form">
                    <input id="input" autocomplete="off" placeholder="Escribe tu mensaje...">
                    <button type="submit">📤 Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let currentUser = '';

        function connectToChat() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Por favor ingresa un nombre de usuario');
                return;
            }
            
            currentUser = username;
            
            // Conectar al servidor
            socket = io();
            
            // Notificar al servidor el nombre del usuario
            socket.emit('user connected', username);
            
            // Escuchar mensajes del chat
            socket.on('chat message', (data) => {
                addMessage(data.user, data.text, data.time);
            });
            
            // Escuchar mensajes del sistema
            socket.on('system message', (msg) => {
                addSystemMessage(msg);
            });
            
            // Actualizar lista de usuarios
            socket.on('users list', (users) => {
                updateUsersList(users);
            });
            
            // Ocultar login y mostrar chat
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
        }
        
        function addMessage(user, text, time) {
            const messagesList = document.getElementById('messages');
            const li = document.createElement('li');

            if (user === currentUser) {
                li.className = 'my-message';
            } else {
                li.className = 'other-message';
            }

            li.innerHTML = `
                <span class="message-user">${user}</span>
                <div>${text}</div>
                <div class="message-time">${time}</div>
            `;

            messagesList.appendChild(li);
            scrollToBottom();
        }
        
        function addSystemMessage(msg) {
            const messagesList = document.getElementById('messages');
            const li = document.createElement('li');
            li.className = 'system';
            li.textContent = msg;
            messagesList.appendChild(li);
            scrollToBottom();
        }
        
        function updateUsersList(users) {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '';
            users.forEach(user => {
                const li = document.createElement('li');
                li.textContent = user;
                usersList.appendChild(li);
            });
        }
        
        function scrollToBottom() {
            const messagesArea = document.querySelector('.messages-area');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Enviar mensajes
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value && socket) {
                socket.emit('chat message', input.value);
                input.value = '';
                input.focus();
            }
        });
    </script>
</body>
</html>
