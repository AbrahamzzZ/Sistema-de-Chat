<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat en Tiempo Real</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>💬 Bienvenido al Chat</h2>
            <input type="text" id="usernameInput" placeholder="Ingresa tu nombre" maxlength="20">
            <button onclick="connectToChat()">Conectar</button>
        </div>
    </div>

    <div class="chat-container" style="display: none;" id="chatContainer">
        <div class="users-panel">
            <div class="users-panel-header">
                <h3>👥 Usuarios Conectados</h3>
            </div>
            <ul id="users-list"></ul>
            <button id="logoutBtn" class="logout-btn" type="button">Cerrar sesión</button>
        </div>
        <div class="chat-area">
            <div class="messages-area">
                <ul id="messages"></ul>
            </div>
            <div class="input-area">
                <form id="form">
                    <input id="input" autocomplete="off" placeholder="Escribe tu mensaje...">
                    <button type="submit">📤 Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/chat.js"></script>
</body>
</html>
